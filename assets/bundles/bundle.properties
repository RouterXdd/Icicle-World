#Items
item.icicle-world-thallium.name = Thallium
item.icicle-world-thallium.description = Used extensively in most blocks and ammunition.
item.icicle-world-thallium.details = Thallium. Rather volatile but weirdly flexible within the playground of Rki.
item.icicle-world-spore-wood.name = Spore Wood
item.icicle-world-spore-wood.description = Used as fuel and construction of blocks, particularly simple walls.
item icicle-world-spore-wood.details = Spores introduced from [red][[REDACTED][], that have adapted to the harsh, toxic environment of Rki.
item.icicle-world-prinute.name = Prinute
item.icicle-world-prinute.description = Used extensively in better technologies, above Thallium.
item.icicle-world-soptin.name = Soptin
item.icicle-world-soptin.description = Used in liquid handling structures.
item.icicle-world-ceramical-dust.name = Ceramical Dust
item.icicle-world-ceramical-dust.description = Used for ceramic and silicon synthesis. Looks like someone hates fired clay products.
item.icicle-world-ceramic.name = Ceramic
item.icicle-world-ceramic.description = Used extensively in even better technologies, above Prinute.
item.icicle-world-livesteel.name = Livesteel
item.icicle-world-livesteel.description = Used in tough, self-mending walls and heavier units.
item.icicle-world-polonium.name = Polonium
item.icicle-world-polonium.description = Used extensively in even better technologies, above Ceramic. 
item.icicle-world-polonium.details = Rarely found atop the surface and ready to be harvested, for some reason.
item.icicle-world-polonium-charge.name = Polonium Charge
item.icicle-world-polonium-charge.description = Used in power production and ammunition.
item.icicle-world-dense-alloy.name = Dense Alloy
item.icicle-world-dense-alloy.description = Used in the best technologies available in Rki, above Polonium.
item.icicle-world-cerymec.name = Cerymec
item.icicle-world-cerymec.description = Used in lightweight technology and ammunition.
item.icicle-world-chalk-stone.name = Chalk Stone
item.icicle-world-chalk-stone.description = Recycled in the Quarry for its valuable constituents.

