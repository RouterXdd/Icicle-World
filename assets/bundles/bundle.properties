#Sectors
sector.icicle-world-fall-point.name = Zero Point
sector.icicle-world-fall-point.description = Our first landing site. We tried to land here before, but it was a failure. Now it's time for a second attempt.
sector.icicle-world-primary-base.name = Primary Base
sector.icicle-world-primary-base.description = A small enemy base has been detected. Land here, research [accent]Prinute[], and create [accent]Vessel[] units.
sector.icicle-world-ignition.name = Ignition
sector.icicle-world-ignition.description = A river with a destroyed base at its center. However, the river is still burning, making it difficult for the enemy to pass through, and may affect our propagation.
sector.icicle-world-methane-purification.name = Methane Purification
sector.icicle-world-methane-purification.description = This sector contains methane-flooded terrain. Research [accent]Aqua Constructor[] and use these units to destroy the enemy base.
sector.icicle-world-purple-fortress.name = Purple Fortress
sector.icicle-world-purple-fortress.description = A ruined fortress. Land here and recover new tech. A log file was detected deep within; retrieve it...
sector.icicle-world-purple-fortress.details = It seems this was Malis's base, until[red] something[] happened...
sector.icicle-world-trinity-column.name = Trinity Column
sector.icicle-world-trinity-column.description = An enemy outpost, where it's found that they are producing a highly dangerous unit. Destroy the base before [red]it[] is completed.
sector.icicle-world-resurgent.name = Resurgent
sector.icicle-world-resurgent.description = This sector contains a new type of ore, but it is untouched using our current technology. Research the [accent]Ore Finder[] and [accent]Methane Digger[] to gain access to it, and repel stronger enemy waves.
sector.icicle-world-paths.name = Paths
sector.icicle-world-paths.description = Three different paths. The enemy will send units through them. Prepare for the worst.
sector.icicle-world-broken-complex.name = Broken Mine
sector.icicle-world-broken-complex.description = Derelict structures have been found in this sector. Use them to obtain a new material: [accent]Polonium[].
sector.icicle-world-flame-ocean.name = Flammable Ocean
sector.icicle-world-flame-ocean.description = A region with vast amounts of methane. Destroy the enemy base using naval units.
sector.icicle-world-aggressive-tactic.name = Aggressive Tactics
sector.icicle-world-aggressive-tactic.description = A place of unknown ruins, mostly filled with dust crushers. The enemy will send another [red]powerful[] unit.
sector.icicle-world-execution.name = Execution
sector.icicle-world-execution.description = We near the enemy's main base. Now the Genesis will send all their units to destroy us. Prepare to see our old friends.
sector.icicle-world-execution.details = When we are closer to main base, many more ruins dot our path... What came here before our landing?
sector.icicle-world-finality.name = Finality
sector.icicle-world-finality.description = We are here, the final Genesis's base. Destroy it by using every researched tech on this planet.
sector.icicle-world-cathedral.name = Cathedral
sector.icicle-world-cathedral.description = The old structure, which purpose is unknown. Defend yourself from remaining units of Genesis.
#Logs
logs.icicle-world-crux-getout.name = Log [Crux]: Warning
logs.icicle-world-crux-getout.description = If anybody can read this, [red]LEAVE THIS PLANET AT ONCE! THIS IS A TRAP! THEY ARE EVERYWHE-[][[ERR: UNEXPECTED END OF FILE]
logs.icicle-world-crux-getout.details = Wait... what is [red]that[] log doing here?
logs.icicle-world-malis-fortress-attack.name = Log [Malis]: Fortress
logs.icicle-world-malis-fortress-attack.description = Our landing here was a failure. At first, we built a factory with defenses using the resources we had. But then, [cyan]they[] came... Our defenses could hold against [cyan]their[] attacks, but then we encountered a tank; one of ours, but with cyan-colored parts. It breached our walls, overpowered our turrets, and destroyed our base...\n\nIf anybody is brave or foolish enough to attempt to contest whatever is in this planet, do not come unprepared.
logs.icicle-world-ignition-log.name = Log [Venixen]: Ignition
logs.icicle-world-ignition-log.description = The [cyan]enemy[] attacked us, and we decided to... ignite the river! The plan worked! [cyan]They[] retreated, and now we can capture this other sector to have longer control on this planet.
logs.icicle-world-methane-pur-threat.name = log [Unknown Sender]: For Sharded
logs.icicle-world-methane-pur-threat.description = Leave this planet, [stat]Invader[]. It does [red]NOT[] belong to you!!!
logs.icicle-world-execution-prelude.name = log [Genesis]: Enough!!
logs.icicle-world-execution-prelude.description = Enough of your interjections!! If [stat]YOU[] dare to push through and deeper, you will face consequences, and we will ensure [red]your downfall...[]
logs.icicle-world-memory.name = log [?r#g?#]: Fa#s? re?#e?t
logs.icicle-world-memory.description = Seems Genesis decided to retreat in the underground to the caves and starts attack from there. It will make troubles in this war.
logs.icicle-world-memory.details = War... War on every planet in this system... That was a true chaos...
